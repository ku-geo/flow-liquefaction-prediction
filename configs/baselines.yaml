data_path: "../data/liquefaction_dataset.npz"

L: 80
step: 10
diff_mode: "backward"

training:
  epochs: 150
  batch_size: 64
  lr: 5.0e-4
  weight_decay: 1.0e-4
  grad_clip: 1.0

loss:
  thresholds: [1, 2, 5]
  thr_weights: [3.0, 1.5, 1.0]
  reg_cutoff: 5
  alpha_reg: 2.0

lstm:
  hidden_size: 32
  num_layers: 2
  dropout: 0.0

fft_mlp:
  n_fft: 20
  hidden_sizes: [128, 64]
  dropout: 0.0

xgboost:
  n_estimators: 200
  max_depth: 6
  learning_rate: 0.1
  subsample: 0.8
